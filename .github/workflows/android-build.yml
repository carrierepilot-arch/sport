name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js static export for APK
        run: npx prisma generate && npx next build
        env:
          BUILD_TARGET: apk
          DATABASE_URL: "file:./dev.db"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Initialize Capacitor Android
        run: |
          rm -rf android
          npx cap add android

      - name: Build unsigned APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK with apksigner v2
        run: |
          keytool -genkey -v -keystore sport.keystore \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias sport-key \
            -storepass "SportKey2026!" \
            -keypass "SportKey2026!" \
            -dname "CN=Sport Fitness,O=Sport,C=FR" \
            -noprompt

          BUILD_TOOLS=$(ls ${ANDROID_SDK_ROOT}/build-tools/ | sort -V | tail -1)
          ZIPALIGN="${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/zipalign"
          APKSIGNER="${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/apksigner"

          UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED="android/app/build/outputs/apk/release/app-release-aligned.apk"
          SIGNED="android/app/build/outputs/apk/release/sport.apk"

          $ZIPALIGN -v -p 4 "$UNSIGNED" "$ALIGNED"

          $APKSIGNER sign \
            --ks sport.keystore \
            --ks-pass pass:"SportKey2026!" \
            --key-pass pass:"SportKey2026!" \
            --ks-key-alias sport-key \
            --out "$SIGNED" \
            "$ALIGNED"

          $APKSIGNER verify --verbose "$SIGNED"
          du -h "$SIGNED"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sport-apk
          path: android/app/build/outputs/apk/release/sport.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/sport.apk
          draft: false
          prerelease: false
          body: |
            ## APK Sport

            Telechargez sport.apk et installez sur votre telephone Android.

            1. Telechargez sport.apk
            2. Ouvrez le fichier sur le telephone
            3. Autorisez sources inconnues si demande
            4. Profitez - fonctionne 100% hors ligne
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
