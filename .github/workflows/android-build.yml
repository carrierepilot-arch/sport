name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prepare APK build - patch login for offline mode
        run: |
          rm -rf app/api
          
          cat > app/login/page.tsx << 'LoginCode'
          'use client';
          import { useState } from 'react';
          import Link from 'next/link';
          import { useRouter } from 'next/navigation';
          
          export default function LoginPage() {
            const [email, setEmail] = useState('');
            const [loading, setLoading] = useState(false);
            const router = useRouter();
            
            const handleSubmit = async (e: React.FormEvent) => {
              e.preventDefault();
              setLoading(true);
              setTimeout(() => {
                localStorage.setItem('token', 'offline-token-' + Date.now());
                localStorage.setItem('user', JSON.stringify({
                  id: 1,
                  email: email || 'demo@sport.local',
                  name: 'Demo User',
                }));
                router.push('/dashboard');
              }, 300);
            };
            
            return (
              <div className="min-h-screen flex items-center justify-center px-4 py-8 ios-screen">
                <div className="w-full max-w-md">
                  <div className="ios-card p-6 sm:p-8">
                    <div className="text-center mb-8">
                      <h1 className="text-3xl font-black tracking-tight text-gray-900 mb-2">SPORT</h1>
                      <p className="text-gray-500">Entrainez-vous partout - Compte demo (offline)</p>
                    </div>
                    <form onSubmit={handleSubmit} className="space-y-6">
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-2">Email (optionnel)</label>
                        <input
                          type="email"
                          value={email}
                          onChange={(e) => setEmail(e.target.value)}
                          className="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-sky-500"
                          placeholder="utilisateur@email.com"
                        />
                      </div>
                      <button
                        type="submit"
                        disabled={loading}
                        className="w-full bg-sky-500 text-white font-semibold py-3 px-4 rounded-2xl hover:bg-sky-600 disabled:bg-gray-400"
                      >
                        {loading ? 'Connexion...' : 'Commencer l''entrainement'}
                      </button>
                    </form>
                    <p className="text-xs text-gray-400 text-center mt-4">Mode offline - Donnees stockees localement</p>
                  </div>
                </div>
              </div>
            );
          }
          LoginCode
          
          echo "✓ Login page patched for offline mode"

      - name: Build Next.js static export for APK
        run: npx prisma generate && npx next build
        env:
          BUILD_TARGET: apk
          DATABASE_URL: "file:./dev.db"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Initialize Capacitor Android
        run: |
          rm -rf android
          npx cap add android

      - name: Build unsigned APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK with apksigner (v2)
        run: |
          keytool -genkey -v -keystore sport.keystore \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias sport-key \
            -storepass "SportKey2026!" \
            -keypass "SportKey2026!" \
            -dname "CN=Sport Fitness,O=Sport,C=FR" \
            -noprompt

          BUILD_TOOLS=$(ls ${ANDROID_SDK_ROOT}/build-tools/ | sort -V | tail -1)
          ZIPALIGN="${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/zipalign"
          APKSIGNER="${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/apksigner"

          UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED="android/app/build/outputs/apk/release/app-release-aligned.apk"
          SIGNED="android/app/build/outputs/apk/release/sport.apk"

          $ZIPALIGN -v -p 4 "$UNSIGNED" "$ALIGNED"

          $APKSIGNER sign \
            --ks sport.keystore \
            --ks-pass pass:"SportKey2026!" \
            --key-pass pass:"SportKey2026!" \
            --ks-key-alias sport-key \
            --out "$SIGNED" \
            "$ALIGNED"

          $APKSIGNER verify --verbose "$SIGNED"
          du -h "$SIGNED"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sport-apk
          path: android/app/build/outputs/apk/release/sport.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/sport.apk
          draft: false
          prerelease: false
          body: |
            ## APK Sport - Offline Complete

            Telechargez sport.apk - Fonctionne 100% sans internet
          
            **Installation:**
            1. Telechargez sport.apk
            2. Ouvrez-le sur votre telephone (Gestionnaire fichiers)
            3. Autorisez sources inconnues si demande
            4. Utilisez le compte demo - aucun login requis
          
            Toutes vos donnees sont stockees localement.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
