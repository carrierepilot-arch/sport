name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prepare APK build - patch login for offline
        run: |
          rm -rf app/api
          
          cat > app/login/page.tsx << 'EOF'
          "use client";
          import { useState } from "react";
          import { useRouter } from "next/navigation";
          
          export default function LoginPage() {
            const [email, setEmail] = useState("");
            const [loading, setLoading] = useState(false);
            const router = useRouter();
            
            const handleSubmit = async (e) => {
              e.preventDefault();
              setLoading(true);
              setTimeout(() => {
                localStorage.setItem("token", "offline-" + Date.now());
                localStorage.setItem("user", JSON.stringify({
                  id: 1,
                  email: email || "demo@sport.local",
                  name: "Demo User",
                }));
                router.push("/dashboard");
              }, 300);
            };
            
            return (
              <div className="min-h-screen flex items-center justify-center px-4 py-8">
                <div className="w-full max-w-md">
                  <div className="p-6 sm:p-8 bg-white rounded-lg shadow">
                    <h1 className="text-3xl font-bold text-center mb-2">SPORT</h1>
                    <p className="text-gray-500 text-center mb-8">Entrainement hors ligne</p>
                    <form onSubmit={handleSubmit} className="space-y-6">
                      <input
                        type="email"
                        value={email}
                        onChange={(e) => setEmail(e.target.value)}
                        placeholder="Email (optionnel)"
                        className="w-full px-4 py-3 border rounded-lg"
                      />
                      <button
                        type="submit"
                        disabled={loading}
                        className="w-full bg-sky-500 text-white font-semibold py-3 rounded-lg hover:bg-sky-600 disabled:bg-gray-400"
                      >
                        {loading ? "Chargement..." : "Commencer"}
                      </button>
                    </form>
                    <p className="text-xs text-gray-400 text-center mt-4">Fonctionne 100% hors ligne</p>
                  </div>
                </div>
              </div>
            );
          }
          EOF
          
          echo "Login page created"

      - name: Build Next.js static export
        run: npx prisma generate && npx next build
        env:
          BUILD_TARGET: apk
          DATABASE_URL: "file:./dev.db"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Initialize Capacitor
        run: |
          rm -rf android
          npx cap add android

      - name: Build APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore sport.keystore \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias sport-key \
            -storepass "SportKey2026" \
            -keypass "SportKey2026" \
            -dname "CN=Sport,O=Sport,C=FR" \
            -noprompt

          BUILD_TOOLS=$(ls ${ANDROID_SDK_ROOT}/build-tools/ | sort -V | tail -1)
          ZIPALIGN="${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/zipalign"
          APKSIGNER="${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/apksigner"

          UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED="android/app/build/outputs/apk/release/app-release-aligned.apk"
          SIGNED="android/app/build/outputs/apk/release/sport.apk"

          $ZIPALIGN -v -p 4 "$UNSIGNED" "$ALIGNED"
          $APKSIGNER sign --ks sport.keystore --ks-pass pass:SportKey2026 --key-pass pass:SportKey2026 --ks-key-alias sport-key --out "$SIGNED" "$ALIGNED"
          $APKSIGNER verify --verbose "$SIGNED"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/sport.apk
          draft: false
          prerelease: false
          body: "APK Sport 100% offline - Pret pour Google Play"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
