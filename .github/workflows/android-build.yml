name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prepare static APK export
        run: |
          if [ -d app/api ]; then
            mv app/api app_api_ci_backup
          fi

      - name: Build Next.js static export
        run: npx prisma generate && npx next build
        env:
          BUILD_TARGET: apk
          DATABASE_URL: "file:./dev.db"
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_API_BASE_URL: "https://sport-carrierepilot-8919s-projects.vercel.app"

      - name: Initialize Capacitor
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      - name: Build APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          keytool -genkey -v -keystore sport.keystore \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias sport-key \
            -storepass "SportKey2026" \
            -keypass "SportKey2026" \
            -dname "CN=Sport,O=Sport,C=FR" \
            -noprompt

          BUILD_TOOLS=$(ls ${ANDROID_SDK_ROOT}/build-tools/ | sort -V | tail -1)
          ZIPALIGN="${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/zipalign"
          APKSIGNER="${ANDROID_SDK_ROOT}/build-tools/${BUILD_TOOLS}/apksigner"

          UNSIGNED="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          ALIGNED="android/app/build/outputs/apk/release/app-release-aligned.apk"
          SIGNED="android/app/build/outputs/apk/release/sport.apk"

          $ZIPALIGN -v -p 4 "$UNSIGNED" "$ALIGNED"
          $APKSIGNER sign --ks sport.keystore --ks-pass pass:SportKey2026 --key-pass pass:SportKey2026 --ks-key-alias sport-key --out "$SIGNED" "$ALIGNED"
          $APKSIGNER verify --verbose "$SIGNED"

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/sport.apk
          draft: false
          prerelease: false
          body: "APK Sport 100% offline - Pret pour Google Play"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
