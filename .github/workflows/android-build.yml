name: Build Android APK for Google Play

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v1.0.0
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode keystore
        env:
          KEYSTORE_CONTENT: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PATH: ./android/sport.keystore
        run: |
          echo "$KEYSTORE_CONTENT" | base64 -d > "$KEYSTORE_PATH"
          ls -lha "$KEYSTORE_PATH"

      - name: Build APK (unsigned)
        working-directory: ./android
        run: ./gradlew assembleRelease

      - name: Sign APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: sport-key
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        working-directory: ./android
        run: |
          UNSIGNED_APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED_APK="app/build/outputs/apk/release/app-release.apk"
          
          # Sign the APK
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore ../android/sport.keystore \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            "$UNSIGNED_APK" \
            "$KEY_ALIAS"
          
          # Verify signature
          jarsigner -verify -verbose "$UNSIGNED_APK"
          
          # Align APK (zipAlign)
          ${ANDROID_SDK_ROOT}/build-tools/*/zipalign -v 4 \
            "$UNSIGNED_APK" \
            "$SIGNED_APK"
          
          echo "✓ Signed APK ready: $SIGNED_APK"
          ls -lha "$SIGNED_APK"

      - name: Upload to artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: ./android/app/build/outputs/apk/release/app-release.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: ./android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK
        if: success()
        run: |
          echo "✓ APK built successfully!"
          echo "📦 Download from: Artifacts or Release"
          echo "📤 Ready to upload to Google Play Store"
