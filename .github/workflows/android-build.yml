name: Build Offline-First Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npx prisma generate && npx next build
        env:
          DATABASE_URL: "file:./dev.db"
          SKIP_ENV_VALIDATION: "1"
          NEXT_PUBLIC_MODE: offline

      - name: Initialize Capacitor Android
        run: |
          rm -rf android
          npx cap add android

      - name: Build unsigned APK
        working-directory: ./android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore sport.keystore \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias sport-key \
            -storepass "SeCuRe@P@ssw0rd" \
            -keypass "SeCuRe@P@ssw0rd" \
            -dname "CN=Sport Fitness,O=Sport,C=FR" \
            -noprompt

      - name: Sign APK
        run: |
          UNSIGNED_APK="android/app/build/outputs/apk/release/app-release-unsigned.apk"
          SIGNED_APK="android/app/build/outputs/apk/release/app-release.apk"
          
          jarsigner -verbose \
            -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore sport.keystore \
            -storepass "SeCuRe@P@ssw0rd" \
            -keypass "SeCuRe@P@ssw0rd" \
            "$UNSIGNED_APK" sport-key
          
          mv "$UNSIGNED_APK" "$SIGNED_APK"
          ls -lh "$SIGNED_APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: sport-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
          body: |
            APK Sport - Offline-First
            - Fonctionne 100% hors ligne
            - Pret pour Google Play Store
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

